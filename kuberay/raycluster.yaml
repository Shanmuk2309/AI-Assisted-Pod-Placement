apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: pod-placement-ray

spec:
  rayVersion: "2.47.1"

  headGroupSpec:

    serviceType: ClusterIP

    rayStartParams:
      dashboard-host: "0.0.0.0"

    template:
      spec:
        containers:
          - name: ray-head

            image: pod-placement:latest
            imagePullPolicy: IfNotPresent

            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"

              limits:
                cpu: "1"
                memory: "2Gi"

  workerGroupSpecs:

    - replicas: 1
      minReplicas: 1
      maxReplicas: 2

      groupName: workers

      rayStartParams: {}

      template:
        spec:
          containers:
            - name: ray-worker

              image: pod-placement:latest
              imagePullPolicy: IfNotPresent

              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"

                limits:
                  cpu: "1"
                  memory: "2Gi"






