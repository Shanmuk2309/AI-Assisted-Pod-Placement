apiVersion: apps/v1

kind: Deployment

metadata:

  name: scenario-service

  namespace: kuberay

spec:

  replicas: 1

  selector:

    matchLabels:

      app: scenario-service

  template:

    metadata:

      labels:

        app: scenario-service

    spec:

      containers:

      - name: scenario-service

        image: pod-placement:latest

        imagePullPolicy: Never

        command:

        - uvicorn

        - scenario_service.main:app

        - --host

        - 0.0.0.0

        - --port

        - "8000"

        env:

        - name: RAY_ADDRESS

          value: ray://raycluster-head-svc:10001

        ports:

        - containerPort: 8000