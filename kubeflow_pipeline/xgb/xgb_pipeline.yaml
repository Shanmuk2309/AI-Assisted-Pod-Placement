# PIPELINE DEFINITION
# Name: pod-placement-xgboost-training-pipeline
components:
  comp-train-xgb-component:
    executorLabel: exec-train-xgb-component
deploymentSpec:
  executors:
    exec-train-xgb-component:
      container:
        args:
        - train.py
        command:
        - python
        image: pod-placement-xgboost-trainer:v1
pipelineInfo:
  name: pod-placement-xgboost-training-pipeline
root:
  dag:
    tasks:
      train-xgb-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-xgb-component
        taskInfo:
          name: Train XGBoost Model
schemaVersion: 2.1.0
sdkVersion: kfp-2.15.0
