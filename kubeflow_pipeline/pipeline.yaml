# PIPELINE DEFINITION
# Name: pod-placement-ensemble-pipeline
components:
  comp-build-ensemble-bundle:
    executorLabel: exec-build-ensemble-bundle
    inputDefinitions:
      parameters:
        rf_model:
          parameterType: STRING
        xgb_model:
          parameterType: STRING
    outputDefinitions:
      parameters:
        ensemble_bundle:
          parameterType: STRING
  comp-download-dataset:
    executorLabel: exec-download-dataset
    outputDefinitions:
      parameters:
        dataset_csv:
          parameterType: STRING
  comp-evaluate-ensemble:
    executorLabel: exec-evaluate-ensemble
    inputDefinitions:
      parameters:
        ensemble_bundle:
          parameterType: STRING
        test_csv:
          parameterType: STRING
    outputDefinitions:
      parameters:
        metrics_json:
          parameterType: STRING
  comp-report-metrics:
    executorLabel: exec-report-metrics
    inputDefinitions:
      parameters:
        metrics_json:
          parameterType: STRING
  comp-split-dataset:
    executorLabel: exec-split-dataset
    inputDefinitions:
      parameters:
        dataset_csv:
          parameterType: STRING
    outputDefinitions:
      parameters:
        test_csv:
          parameterType: STRING
        train_csv:
          parameterType: STRING
  comp-train-random-forest:
    executorLabel: exec-train-random-forest
    inputDefinitions:
      parameters:
        train_csv:
          parameterType: STRING
    outputDefinitions:
      parameters:
        rf_model:
          parameterType: STRING
  comp-train-xgboost:
    executorLabel: exec-train-xgboost
    inputDefinitions:
      parameters:
        train_csv:
          parameterType: STRING
    outputDefinitions:
      parameters:
        xgb_model:
          parameterType: STRING
  comp-upload-ensemble-bundle:
    executorLabel: exec-upload-ensemble-bundle
    inputDefinitions:
      parameters:
        ensemble_bundle:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-build-ensemble-bundle:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - build_ensemble_bundle
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'joblib' 'minio'\
          \ 'numpy' 'pandas' 'scikit-learn' 'xgboost'  &&  python3 -m pip install\
          \ --quiet --no-warn-script-location 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef build_ensemble_bundle(\n    rf_model: InputPath(str),\n    xgb_model:\
          \ InputPath(str),\n    ensemble_bundle: OutputPath(str),\n):\n    import\
          \ json\n\n    from joblib import dump, load\n\n    rf = load(rf_model)\n\
          \    xgb = load(xgb_model)\n\n    bundle = {\n        \"strategy\": \"mean\"\
          ,\n        \"models\": {\n            \"random_forest\": rf,\n         \
          \   \"xgboost\": xgb,\n        },\n        \"metadata\": {\n           \
          \ \"description\": \"Averaging ensemble of RandomForestRegressor and XGBRegressor\"\
          ,\n        },\n    }\n\n    dump(bundle, ensemble_bundle)\n\n    with open(ensemble_bundle\
          \ + \".json\", \"w\", encoding=\"utf-8\") as metadata_file:\n        json.dump(bundle[\"\
          metadata\"], metadata_file, indent=2)\n\n"
        image: python:3.10
    exec-download-dataset:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - download_dataset
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'joblib' 'minio'\
          \ 'numpy' 'pandas' 'scikit-learn' 'xgboost'  &&  python3 -m pip install\
          \ --quiet --no-warn-script-location 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef download_dataset(dataset_csv: OutputPath(str)):\n    import os\n\
          \n    from minio import Minio\n\n    endpoint = os.getenv(\"MINIO_ENDPOINT\"\
          , \"host.minikube.internal:9000\")\n    access_key = os.getenv(\"MINIO_ACCESS_KEY\"\
          , \"minioadmin\")\n    secret_key = os.getenv(\"MINIO_SECRET_KEY\", \"minioadmin\"\
          )\n    bucket = os.getenv(\"DATASET_BUCKET\", \"datasets\")\n    object_name\
          \ = os.getenv(\"DATASET_OBJECT\", \"dataset.csv\")\n\n    client = Minio(\n\
          \        endpoint,\n        access_key=access_key,\n        secret_key=secret_key,\n\
          \        secure=False,\n    )\n\n    client.fget_object(bucket, object_name,\
          \ dataset_csv)\n\n"
        image: python:3.10
    exec-evaluate-ensemble:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_ensemble
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'joblib' 'minio'\
          \ 'numpy' 'pandas' 'scikit-learn' 'xgboost'  &&  python3 -m pip install\
          \ --quiet --no-warn-script-location 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_ensemble(\n    ensemble_bundle: InputPath(str),\n  \
          \  test_csv: InputPath(str),\n    metrics_json: OutputPath(str),\n):\n \
          \   import json\n\n    import numpy as np\n    import pandas as pd\n   \
          \ from joblib import load\n    from sklearn.metrics import mean_squared_error\n\
          \n    df = pd.read_csv(test_csv)\n\n    feature_columns = [\n        \"\
          difficulty\",\n        \"cu_cpu_free_ratio\",\n        \"du_cpu_free_ratio\"\
          ,\n        \"cu_mem_free_ratio\",\n        \"du_mem_free_ratio\",\n    \
          \    \"latency_ms\",\n        \"latency_budget\",\n        \"same_node\"\
          ,\n        \"same_zone\",\n        \"cu_load\",\n        \"du_load\",\n\
          \        \"cu_cpu_violation\",\n        \"cu_mem_violation\",\n        \"\
          du_cpu_violation\",\n        \"du_mem_violation\",\n        \"cpu_balance\"\
          ,\n        \"mem_balance\",\n        \"cu_cpu_req\",\n        \"du_cpu_req\"\
          ,\n        \"cu_mem_req\",\n        \"du_mem_req\",\n    ]\n\n    X_test\
          \ = df[feature_columns]\n    y_test = df[\"score\"]\n    scenario_ids =\
          \ df[\"scenario_id\"]\n\n    bundle = load(ensemble_bundle)\n    rf = bundle[\"\
          models\"][\"random_forest\"]\n    xgb = bundle[\"models\"][\"xgboost\"]\n\
          \n    rf_predictions = rf.predict(X_test)\n    xgb_predictions = xgb.predict(X_test)\n\
          \    ensemble_predictions = np.mean(\n        np.vstack([rf_predictions,\
          \ xgb_predictions]),\n        axis=0,\n    )\n\n    rmse = mean_squared_error(y_test,\
          \ ensemble_predictions, squared=False)\n\n    results_df = pd.DataFrame(\n\
          \        {\n            \"scenario_id\": scenario_ids.values,\n        \
          \    \"true_score\": y_test.values,\n            \"predicted_score\": ensemble_predictions,\n\
          \        }\n    )\n\n    true_best = results_df.groupby(\"scenario_id\"\
          )[\"true_score\"].idxmin()\n    pred_best = results_df.groupby(\"scenario_id\"\
          )[\"predicted_score\"].idxmin()\n\n    true_best_rows = results_df.loc[true_best]\n\
          \    pred_best_rows = results_df.loc[pred_best]\n\n    matches = 0\n   \
          \ total = len(true_best_rows)\n\n    for scenario_id in true_best_rows[\"\
          scenario_id\"]:\n        true_idx = true_best_rows[\n            true_best_rows[\"\
          scenario_id\"] == scenario_id\n        ].index[0]\n        pred_idx = pred_best_rows[\n\
          \            pred_best_rows[\"scenario_id\"] == scenario_id\n        ].index[0]\n\
          \n        if true_idx == pred_idx:\n            matches += 1\n\n    top1_agreement\
          \ = matches / total if total else 0.0\n\n    metrics = {\n        \"rmse\"\
          : float(rmse),\n        \"top1_agreement\": float(top1_agreement),\n   \
          \ }\n\n    with open(metrics_json, \"w\", encoding=\"utf-8\") as output_file:\n\
          \        json.dump(metrics, output_file, indent=2)\n\n"
        image: python:3.10
    exec-report-metrics:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - report_metrics
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'joblib' 'minio'\
          \ 'numpy' 'pandas' 'scikit-learn' 'xgboost'  &&  python3 -m pip install\
          \ --quiet --no-warn-script-location 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef report_metrics(metrics_json: InputPath(str)):\n    import json\n\
          \n    with open(metrics_json, \"r\", encoding=\"utf-8\") as input_file:\n\
          \        metrics = json.load(input_file)\n\n    print(\"Ensemble metrics\"\
          )\n    print(f\"RMSE: {metrics['rmse']:.4f}\")\n    print(f\"Top-1 Agreement:\
          \ {metrics['top1_agreement']:.4f}\")\n\n"
        image: python:3.10
    exec-split-dataset:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - split_dataset
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'joblib' 'minio'\
          \ 'numpy' 'pandas' 'scikit-learn' 'xgboost'  &&  python3 -m pip install\
          \ --quiet --no-warn-script-location 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef split_dataset(\n    dataset_csv: InputPath(str),\n    train_csv:\
          \ OutputPath(str),\n    test_csv: OutputPath(str),\n):\n    import pandas\
          \ as pd\n    from sklearn.model_selection import train_test_split\n\n  \
          \  df = pd.read_csv(dataset_csv)\n\n    if \"difficulty\" in df.columns:\n\
          \        df = df.copy()\n        df[\"difficulty\"] = df[\"difficulty\"\
          ].map(\n            {\n                \"easy\": 0,\n                \"\
          medium\": 1,\n                \"hard\": 2,\n            }\n        )\n\n\
          \    required_columns = [\n        \"difficulty\",\n        \"cu_cpu_free_ratio\"\
          ,\n        \"du_cpu_free_ratio\",\n        \"cu_mem_free_ratio\",\n    \
          \    \"du_mem_free_ratio\",\n        \"latency_ms\",\n        \"latency_budget\"\
          ,\n        \"same_node\",\n        \"same_zone\",\n        \"cu_load\",\n\
          \        \"du_load\",\n        \"cu_cpu_violation\",\n        \"cu_mem_violation\"\
          ,\n        \"du_cpu_violation\",\n        \"du_mem_violation\",\n      \
          \  \"cpu_balance\",\n        \"mem_balance\",\n        \"cu_cpu_req\",\n\
          \        \"du_cpu_req\",\n        \"cu_mem_req\",\n        \"du_mem_req\"\
          ,\n        \"score\",\n        \"scenario_id\",\n    ]\n\n    missing_columns\
          \ = [column for column in required_columns if column not in df.columns]\n\
          \    if missing_columns:\n        raise ValueError(f\"Dataset is missing\
          \ required columns: {missing_columns}\")\n\n    train_df, test_df = train_test_split(\n\
          \        df,\n        test_size=0.2,\n        random_state=42,\n    )\n\n\
          \    train_df.to_csv(train_csv, index=False)\n    test_df.to_csv(test_csv,\
          \ index=False)\n\n"
        image: python:3.10
    exec-train-random-forest:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_random_forest
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'joblib' 'minio'\
          \ 'numpy' 'pandas' 'scikit-learn' 'xgboost'  &&  python3 -m pip install\
          \ --quiet --no-warn-script-location 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_random_forest(train_csv: InputPath(str), rf_model: OutputPath(str)):\n\
          \    import pandas as pd\n    from joblib import dump\n    from sklearn.ensemble\
          \ import RandomForestRegressor\n\n    df = pd.read_csv(train_csv)\n\n  \
          \  feature_columns = [\n        \"difficulty\",\n        \"cu_cpu_free_ratio\"\
          ,\n        \"du_cpu_free_ratio\",\n        \"cu_mem_free_ratio\",\n    \
          \    \"du_mem_free_ratio\",\n        \"latency_ms\",\n        \"latency_budget\"\
          ,\n        \"same_node\",\n        \"same_zone\",\n        \"cu_load\",\n\
          \        \"du_load\",\n        \"cu_cpu_violation\",\n        \"cu_mem_violation\"\
          ,\n        \"du_cpu_violation\",\n        \"du_mem_violation\",\n      \
          \  \"cpu_balance\",\n        \"mem_balance\",\n        \"cu_cpu_req\",\n\
          \        \"du_cpu_req\",\n        \"cu_mem_req\",\n        \"du_mem_req\"\
          ,\n    ]\n\n    X_train = df[feature_columns]\n    y_train = df[\"score\"\
          ]\n\n    model = RandomForestRegressor(\n        n_estimators=60,\n    \
          \    max_depth=12,\n        random_state=42,\n        n_jobs=-1,\n    )\n\
          \    model.fit(X_train, y_train)\n\n    dump(model, rf_model)\n\n"
        image: python:3.10
    exec-train-xgboost:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_xgboost
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'joblib' 'minio'\
          \ 'numpy' 'pandas' 'scikit-learn' 'xgboost'  &&  python3 -m pip install\
          \ --quiet --no-warn-script-location 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_xgboost(train_csv: InputPath(str), xgb_model: OutputPath(str)):\n\
          \    import pandas as pd\n    from joblib import dump\n    from xgboost\
          \ import XGBRegressor\n\n    df = pd.read_csv(train_csv)\n\n    feature_columns\
          \ = [\n        \"difficulty\",\n        \"cu_cpu_free_ratio\",\n       \
          \ \"du_cpu_free_ratio\",\n        \"cu_mem_free_ratio\",\n        \"du_mem_free_ratio\"\
          ,\n        \"latency_ms\",\n        \"latency_budget\",\n        \"same_node\"\
          ,\n        \"same_zone\",\n        \"cu_load\",\n        \"du_load\",\n\
          \        \"cu_cpu_violation\",\n        \"cu_mem_violation\",\n        \"\
          du_cpu_violation\",\n        \"du_mem_violation\",\n        \"cpu_balance\"\
          ,\n        \"mem_balance\",\n        \"cu_cpu_req\",\n        \"du_cpu_req\"\
          ,\n        \"cu_mem_req\",\n        \"du_mem_req\",\n    ]\n\n    X_train\
          \ = df[feature_columns]\n    y_train = df[\"score\"]\n\n    model = XGBRegressor(\n\
          \        n_estimators=200,\n        max_depth=6,\n        learning_rate=0.1,\n\
          \        objective=\"reg:squarederror\",\n        random_state=42,\n   \
          \     n_jobs=-1,\n    )\n    model.fit(X_train, y_train)\n\n    dump(model,\
          \ xgb_model)\n\n"
        image: python:3.10
    exec-upload-ensemble-bundle:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - upload_ensemble_bundle
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'joblib' 'minio'\
          \ 'numpy' 'pandas' 'scikit-learn' 'xgboost'  &&  python3 -m pip install\
          \ --quiet --no-warn-script-location 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef upload_ensemble_bundle(ensemble_bundle: InputPath(str)):\n  \
          \  import os\n\n    from minio import Minio\n\n    endpoint = os.getenv(\"\
          MINIO_ENDPOINT\", \"host.minikube.internal:9000\")\n    access_key = os.getenv(\"\
          MINIO_ACCESS_KEY\", \"minioadmin\")\n    secret_key = os.getenv(\"MINIO_SECRET_KEY\"\
          , \"minioadmin\")\n    bucket = os.getenv(\"MODEL_BUCKET\", \"models\")\n\
          \    object_name = os.getenv(\"ENSEMBLE_OBJECT\", \"ensemble_model.pkl\"\
          )\n\n    client = Minio(\n        endpoint,\n        access_key=access_key,\n\
          \        secret_key=secret_key,\n        secure=False,\n    )\n\n    if\
          \ not client.bucket_exists(bucket):\n        client.make_bucket(bucket)\n\
          \n    client.fput_object(bucket, object_name, ensemble_bundle)\n\n"
        image: python:3.10
pipelineInfo:
  name: pod-placement-ensemble-pipeline
root:
  dag:
    tasks:
      build-ensemble-bundle:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-build-ensemble-bundle
        dependentTasks:
        - train-random-forest
        - train-xgboost
        inputs:
          parameters:
            rf_model:
              taskOutputParameter:
                outputParameterKey: rf_model
                producerTask: train-random-forest
            xgb_model:
              taskOutputParameter:
                outputParameterKey: xgb_model
                producerTask: train-xgboost
        taskInfo:
          name: build-ensemble-bundle
      download-dataset:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-download-dataset
        taskInfo:
          name: download-dataset
      evaluate-ensemble:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluate-ensemble
        dependentTasks:
        - build-ensemble-bundle
        - split-dataset
        - upload-ensemble-bundle
        inputs:
          parameters:
            ensemble_bundle:
              taskOutputParameter:
                outputParameterKey: ensemble_bundle
                producerTask: build-ensemble-bundle
            test_csv:
              taskOutputParameter:
                outputParameterKey: test_csv
                producerTask: split-dataset
        taskInfo:
